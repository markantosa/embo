; EMBO ESP32-S3 Firmware — PlatformIO config
; Board: ESP32-S3-WROOM-1-N8 (8MB flash, no PSRAM)
; Flash via USB-C J13 (native USB CDC/JTAG on GPIO19/20)

[env:embo]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 8MB flash, no PSRAM (N8 variant)
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

; Native USB CDC — no UART bridge chip
upload_protocol = esptool
monitor_speed = 115200

build_flags =
    ; Enable built-in USB CDC/JTAG port (GPIO19/20)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; TFT_eSPI pin config (avoids editing library User_Setup.h)
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_MOSI=35
    -DTFT_MISO=37
    -DTFT_SCLK=36
    -DTFT_CS=39
    -DTFT_DC=40
    -DTFT_RST=41
    -DTOUCH_CS=42
    -DSPI_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2000000

lib_deps =
    ; TFT display (ILI9341/ST7789) + XPT2046 touch
    bodmer/TFT_eSPI @ ^2.5.43
    ; TMC2209 stepper driver UART
    teemuatlut/TMCStepper @ ^0.7.3
    ; AD9833 DDS signal generator
    bill2462/AD9833 @ ^1.0.0
    ; NimBLE for wireless debug UART
    h2zero/NimBLE-Arduino @ ^1.4.2
